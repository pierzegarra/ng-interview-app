<div class="align-items-center justify-content-center">
  <div class="card mb-3" style="max-width: 450px;">
    <div class="row g-0">
      <div class="col-md-4">
        <img src="/img/user.png" class="img-fluid rounded-start" alt="...">
      </div>
      <div class="col-md-8">
        <div class="card-body">
          <h3 class="card-title">{{ user.username }} - Enabled: {{ user.enabled}}</h3>
          <hr>
          @for (rol of user.roles; track rol.name) {
            <p>{{ rol.name }}</p>
          } @empty {
            <p>There are no roles.</p>
          }
        </div>
      </div>
    </div>
</div>
